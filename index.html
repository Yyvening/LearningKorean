<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한글 스튜디오 · Powerpuff Edition 🧬</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Gowun+Dodum&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-base: #FFF1F2;       /* Soft nostalgic pink tint */
    --surface: #FFFFFF;       
    --border-color: #000000;  /* Bold cartoon outlines */
    --border-thick: 5px solid var(--border-color);
    --border-thin: 3px solid var(--border-color);
    --text-primary: #000000;  
    --text-secondary: #334155;
    
    /* Powerpuff Identity Palette */
    --blossom-pink: #FF6B8B;  
    --bubbles-blue: #4EA8DE;  
    --buttercup-green: #4ECDC4; 
    --chemical-x-black: #1E293B;
    --pop-yellow: #FFD166;    
    
    --radius-lg: 30px;
    --radius-md: 20px;
    --radius-sm: 10px;
    --shadow-flat: 8px 8px 0px var(--border-color);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body { 
    background-color: var(--bg-base); 
    color: var(--text-primary); 
    font-family: 'Fredoka', sans-serif; 
    min-height: 100vh; 
    display: flex; 
    flex-direction: column;
    align-items: center; 
    justify-content: center; 
    padding: 20px; 
    background-image: radial-gradient(rgba(255, 107, 139, 0.15) 15%, transparent 16%), radial-gradient(rgba(78, 168, 222, 0.15) 15%, transparent 16%);
    background-size: 60px 60px;
    background-position: 0 0, 30px 30px;
  }

  /* --- VIEW LAYOUTS --- */
  .view-panel { display: none; width: 100%; animation: slideUp 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
  .view-panel.active { display: block; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  .compact-container { max-width: 580px; width: 100%; margin: 0 auto; }
  .studio-card { background: var(--surface); border: var(--border-thick); border-radius: var(--radius-lg); padding: 36px; box-shadow: var(--shadow-flat); position: relative; }
  
  .brand-header { text-align: center; margin-bottom: 28px; }
  .brand-header h1 { font-size: 38px; color: var(--border-color); text-shadow: 3px 3px 0px var(--pop-yellow); -webkit-text-stroke: 1px var(--border-color); }
  .brand-header p { font-weight: 600; text-transform: uppercase; letter-spacing: 1px; font-size: 13px; margin-top: 4px; }

  /* --- HERO IDENTITY PICKER GRID --- */
  .hero-select-grid { display: grid; grid-template-columns: 1fr; gap: 16px; margin-bottom: 20px; }
  
  .profile-pick-btn { font-family: inherit; font-size: 18px; font-weight: 700; color: white; border: var(--border-thin); border-radius: var(--radius-md); padding: 20px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; box-shadow: 5px 5px 0px var(--border-color); position: relative; overflow: hidden; text-shadow: 2px 2px 0px rgba(0,0,0,0.4); }
  .profile-pick-btn:active { transform: translate(3px, 3px); box-shadow: 2px 2px 0px var(--border-color); }
  
  .profile-pick-btn.jannica { background: var(--blossom-pink); }
  .profile-pick-btn.rose { background: var(--bubbles-blue); }
  .profile-pick-btn.krystal { background: var(--buttercup-green); }
  .profile-pick-btn.hangeul { background: var(--chemical-x-black); color: var(--pop-yellow); }
  
  .profile-subtitle { font-size: 11px; font-weight: 500; text-transform: uppercase; opacity: 0.9; display: block; margin-top: 2px; text-shadow: none; color: white; background: rgba(0,0,0,0.2); padding: 2px 8px; border-radius: 20px; width: fit-content; }

  .action-btn { font-family: inherit; font-size: 14px; font-weight: 700; text-transform: uppercase; padding: 14px 24px; border-radius: var(--radius-md); border: var(--border-thin); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 4px 4px 0px var(--border-color); background: var(--surface); width: 100%; margin-top: 8px; user-select: none; }
  .action-btn:active { transform: translate(3px, 3px); box-shadow: 1px 1px 0px var(--border-color); }
  .action-btn.success { background: var(--buttercup-green); color: white; }
  .action-btn.danger { background: var(--blossom-pink); color: white; }
  .action-btn.primary { background: var(--bubbles-blue); color: white; }

  .roster-list { background: #FFF; border: var(--border-thin); border-radius: var(--radius-md); padding: 16px; min-height: 100px; margin: 14px 0; display: flex; flex-direction: column; gap: 8px; box-shadow: inset 3px 3px 0px rgba(0,0,0,0.05); }
  .roster-item { padding: 12px 16px; background: white; border: var(--border-thin); border-radius: var(--radius-sm); display: flex; justify-content: space-between; font-weight: 700; font-size: 15px; box-shadow: 2px 2px 0px var(--border-color); }

  /* --- ARENA DESIGN --- */
  .arena-wrapper { max-width: 1000px; width: 100%; margin: 0 auto; display: grid; grid-template-columns: 1fr 280px; gap: 24px; align-items: start; }
  @media (max-width: 850px) { .arena-wrapper { grid-template-columns: 1fr; } }

  .main-deck-workspace { background: var(--surface); border: var(--border-thick); border-radius: var(--radius-lg); padding: 36px; box-shadow: var(--shadow-flat); position: relative; min-height: 480px; display: flex; flex-direction: column; justify-content: space-between; }
  .sidebar-tracker { background: #FFF; border: var(--border-thick); border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow-flat); }

  .progress-bar-container { position: absolute; top: -5px; left: -5px; right: -5px; height: 16px; background: #E2E8F0; border: var(--border-thick); border-radius: var(--radius-lg) var(--radius-lg) 0 0; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--buttercup-green); width: 0%; transition: width 0.3s; border-right: 3px solid var(--border-color); }
  
  .display-hub { text-align: center; margin: 24px 0; min-height: 130px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .stimulus-main { font-family: 'Gowun Dodum', sans-serif; font-size: 52px; font-weight: 700; color: var(--text-primary); line-height: 1.3; text-shadow: 2px 2px 0px #E2E8F0; }
  
  .choices-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; width: 100%; }
  @media (max-width: 500px) { .choices-grid { grid-template-columns: 1fr; } }
  
  .choice-btn { background: var(--surface); border: var(--border-thin); border-radius: var(--radius-md); padding: 18px; font-family: inherit; font-size: 17px; font-weight: 700; cursor: pointer; text-align: left; box-shadow: 4px 4px 0px var(--border-color); transition: 0.1s; }
  .choice-btn.correct { background: var(--buttercup-green) !important; color: white !important; text-shadow: 1px 1px 0px rgba(0,0,0,0.2); }
  .choice-btn.incorrect { background: var(--blossom-pink) !important; color: white !important; opacity: 0.5; text-decoration: line-through; text-shadow: 1px 1px 0px rgba(0,0,0,0.2); }

  .interaction-block-container { width: 100%; margin-bottom: 20px; display: none; text-align: center; }
  .interaction-block-container.active { display: block; }
  
  .speech-wave-indicator { font-size: 13px; font-weight: 700; color: var(--blossom-pink); display: none; margin-top: 8px; animation: pulse 0.8s infinite alternate; }
  @keyframes pulse { from { opacity: 0.4; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

  .sidebar-title { font-size: 12px; font-weight: 700; text-transform: uppercase; color: var(--text-primary); margin-bottom: 12px; border-bottom: 3px solid var(--border-color); padding-bottom: 4px; margin-top: 18px; letter-spacing: 0.5px; }
  .sidebar-title:first-child { margin-top: 0; }
  .badge-stack { display: flex; flex-direction: column; gap: 8px; }
  .live-badge { padding: 10px 14px; background: white; border: var(--border-thin); border-radius: var(--radius-md); font-size: 14px; font-weight: 700; display: flex; justify-content: space-between; box-shadow: 3px 3px 0px var(--border-color); }

  .stat-block { border: var(--border-thick); padding: 20px; border-radius: var(--radius-lg); margin-bottom: 20px; text-align: left; background: white; box-shadow: 5px 5px 0px var(--border-color); }
  .stat-title { font-weight: 700; text-transform: uppercase; font-size: 13px; color: var(--border-color); margin-bottom: 12px; border-bottom: 3px solid var(--border-color); padding-bottom: 4px; }
  .stat-row { display: flex; justify-content: space-between; font-size: 15px; padding: 8px 0; font-weight: 700; border-bottom: 2px dashed var(--border-color); }

  .review-item-tag { display: inline-block; padding: 6px 12px; background: #F1F5F9; border: var(--border-thin); border-radius: var(--radius-sm); font-size: 13px; margin: 6px; font-weight: 700; box-shadow: 2px 2px 0px var(--border-color); }
  .review-item-tag.heavy-fail { background: #FEE2E2; border-color: var(--blossom-pink); color: #B91C1C; }

  .guide-box { background: #EFF6FF; border: var(--border-thin); border-radius: var(--radius-md); padding: 14px; margin-bottom: 16px; font-size: 13px; text-align: left; line-height: 1.4; color: #1E3A8A; box-shadow: 3px 3px 0px var(--border-color); }
  .guide-box strong { color: #1D4ED8; text-transform: uppercase; font-size: 11px; display: block; margin-bottom: 4px; }
</style>
<script src="/socket.io/socket.io.js" onerror="console.log('Local fallback system online.')"></script>
</head>
<body>

  <div id="viewGateway" class="view-panel active">
    <div class="compact-container studio-card">
      <div class="brand-header">
        <h1>한글 스튜디오</h1>
        <p>🎀 Townsville Academy Edition 🧬</p>
      </div>
      
      <div style="font-size: 12px; font-weight: 700; text-transform: uppercase; margin-bottom: 10px; color: var(--text-secondary);">Select Your Character Profile:</div>
      <div class="hero-select-grid">
        <button class="profile-pick-btn jannica" onclick="pickHeroProfile('Jannica', false)">
          <div>Jannica <span class="profile-subtitle">Blossom Pink 💗</span></div> <span>🎯</span>
        </button>
        <button class="profile-pick-btn rose" onclick="pickHeroProfile('Rose', false)">
          <div>Rose <span class="profile-subtitle">Bubbles Blue 💙</span></div> <span>🫧</span>
        </button>
        <button class="profile-pick-btn krystal" onclick="pickHeroProfile('Krystal', false)">
          <div>Krystal <span class="profile-subtitle">Buttercup Green 💚</span></div> <span>⚡</span>
        </button>
        <button class="profile-pick-btn hangeul" onclick="pickHeroProfile('Hangeul 👑', true)">
          <div>Hangeul <span class="profile-subtitle">Chemical X Host Dashboard</span></div> <span>🧪</span>
        </button>
      </div>
    </div>
  </div>

  <div id="viewLobby" class="view-panel">
    <div class="compact-container studio-card">
      <div class="brand-header">
        <h1>Classroom Lobby</h1>
        <p>Assembling the Squad...</p>
      </div>
      
      <div class="guide-box" id="lobbyGuide" style="background:#FFF1F2; border-color:var(--blossom-pink); color:#9F1239">
        <strong>🗺️ Workshop Strategy Board</strong>
        We will rotate through all 4 learning tracks today: <strong>Reading ➔ Speaking ➔ Writing ➔ Context Cases</strong>.
      </div>

      <div class="roster-list" id="lobbyRoster"></div>
      
      <div id="facilitatorControls" style="display:none;">
        <button class="action-btn success" onclick="startQuiz()">Launch First Quiz Deck ▶</button>
      </div>
    </div>
  </div>

  <div id="viewArena" class="view-panel">
    <div class="arena-wrapper">
      
      <main class="main-deck-workspace">
        <div class="progress-bar-container"><div class="progress-fill" id="pBar"></div></div>
        
        <div style="display: flex; justify-content: space-between; font-size:12px; font-weight:700; margin-top:8px;">
          <span id="cardProgress">Card 0/0</span>
          <span style="background:var(--pop-yellow); padding:4px 12px; border:var(--border-thin); border-radius:12px;" id="currentCardMode">Reading Mode</span>
        </div>

        <div class="display-hub">
          <div class="stimulus-main" id="mainWord">한글</div>
          <div id="speechTranscriptionFeedback" style="margin-top:10px; font-size:14px; font-weight:700; color:var(--blossom-pink); min-height:20px;"></div>
        </div>

        <div class="choices-grid interaction-block-container" id="choicesBox"></div>

        <div class
