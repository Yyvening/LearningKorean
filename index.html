<script>
  const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRXpcCILEulBysiVCgHZWNbdIIDz-isW0CeiCkpg0FXerZ8o2N3dD5PNonYkK5nxsCauUWN93JbkZWH/pub?gid=0&single=true&output=csv";
  
  let audioCtx = null;
  let socket = null;
  let clientState = { name: "", isHost: false };
  let vocabPool = []; 
  let gameQueue = []; 
  let activeIndex = 0;
  let activeMode = "reading"; 
  
  let currentCardClicks = 0;
  let myStats = { totalCards: 0, firstTryCorrect: 0, totalClicks: 0, wrongWordsMap: {} };

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition = null;
  if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.lang = 'ko-KR'; // Targets native Korean sound profiles
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;
  }

  function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  function playSound(type) {
    if (!audioCtx) return;
    try {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      if (type === 'success') {
        osc.type = 'triangle'; osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); 
        osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1); 
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        osc.start(); osc.stop(audioCtx.currentTime + 0.25);
      } else if (type === 'error') {
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(140, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
      }
    } catch(e){}
  }

  function switchView(viewId) {
    document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active'));
    document.getElementById(viewId).classList.add('active');
  }

  function promptFacilitator() {
    const pw = prompt("Enter Facilitator Access Passcode:");
    if(pw === "1234") joinRoom(true);
  }

  async function joinRoom(becomeHost) {
    initAudio(); 
    let name = document.getElementById("playerNameInput").value.trim();
    if(!name) {
      if(becomeHost) name = "Facilitator 👑";
      else { alert("Please enter your name!"); return; }
    }

    clientState = { name: name, isHost: becomeHost };
    await loadDatabase();

    socket = io();
    socket.emit("join_session", { name: name, isHost: becomeHost });
    switchView("viewLobby");

    if(becomeHost) {
      document.getElementById("facilitatorControls").style.display = "block";
      document.getElementById("workspaceFilterContainer").style.display = "block";
      document.getElementById("hostEndSessionContainer").style.display = "block";
    }

    socket.on("update_roster", (players) => {
      const lobbyList = document.getElementById("lobbyRoster"); lobbyList.innerHTML = "";
      const arenaList = document.getElementById("liveRosterStatus"); arenaList.innerHTML = "";
      for(let id in players) {
        const row = document.createElement("div"); row.className = "roster-item";
        row.innerHTML = `<span>👤 ${players[id].name}</span> <span>${players[id].status}</span>`;
        lobbyList.appendChild(row);
        if(!players[id].name.includes("👑")) {
          const div = document.createElement("div"); div.className = "live-badge";
          div.innerHTML = `<span>👤 ${players[id].name}</span> <span>${players[id].status}</span>`;
          arenaList.appendChild(div);
        }
      }
    });

    socket.on("sync_game", (serverData) => {
      gameQueue = serverData.queue; activeIndex = serverData.activeIndex;
      if (serverData.mode) activeMode = serverData.mode;
      if(activeIndex >= 0 && activeIndex < gameQueue.length) {
        if(!document.getElementById("viewArena").classList.contains("active")) switchView("viewArena");
        renderCard();
      }
    });

    socket.on("game_over_analytics", (fullLogs) => {
      calculateAndDisplayStats(fullLogs);
    });
  }

  async function loadDatabase() {
    try {
      const res = await fetch(CSV_URL); const txt = await res.text();
      let lines = txt.split("\n").map(l => l.split(","));
      vocabPool = lines.slice(1).map(l => ({ 
        hangeul: l[0]?.trim() || "", english: l[1]?.trim() || "", type: l[2]?.trim() || "", useCase: l[3]?.trim() || ""
      })).filter(v => v.hangeul && v.english);
    } catch(e) {
      vocabPool = [{ hangeul: "하루", english: "a day", type: "Vocab", useCase: "" }];
    }
  }

  function startQuiz() {
    let poolToUse = [...vocabPool];
    if (activeMode === "context") poolToUse = vocabPool.filter(v => v.useCase && v.useCase.length > 2);
    let shuffled = poolToUse.sort(() => Math.random() - 0.5);
    gameQueue = shuffled.slice(0, Math.min(10, shuffled.length));
    socket.emit("start_game", { queue: gameQueue, mode: activeMode });
  }

  function changeClassroomMode() {
    if(!clientState.isHost) return;
    activeMode = document.getElementById("gameModeSelector").value;
    activeIndex = 0; startQuiz();
  }

  function resetCurrentDeckLoop() {
    activeIndex = 0; startQuiz();
  }

  function hideAllInterfaces() {
    document.getElementById("choicesBox").classList.remove("active");
    document.getElementById("writingInterfaceBox").classList.remove("active");
    document.getElementById("speakingInterfaceBox").classList.remove("active");
  }

  function renderCard() {
    currentCardClicks = 0;
    document.getElementById("speechTranscriptionFeedback").textContent = "";
    hideAllInterfaces();

    if(clientState.isHost) {
      document.getElementById("studentWaitMsg").style.display = "none";
      document.getElementById("facilitatorNavBox").style.display = "flex";
      if(activeIndex === gameQueue.length - 1) {
        document.getElementById("nextCardBtn").style.display = "none";
        document.getElementById("resetDeckBtn").style.display = "inline-flex";
      } else {
        document.getElementById("nextCardBtn").style.display = "inline-flex";
        document.getElementById("resetDeckBtn").style.display = "none";
      }
    } else {
      document.getElementById("studentWaitMsg").style.display = "block";
      document.getElementById("facilitatorNavBox").style.display = "none";
    }

    const currentCard = gameQueue[activeIndex];
    document.getElementById("cardProgress").textContent = `Card ${activeIndex + 1} / ${gameQueue.length}`;
    
    const modeLabels = { reading: "📚 Reading Mode", speaking: "🗣️ Speaking Mode", writing: "✍️ Writing Mode", context: "🧠 Context Mode" };
    document.getElementById("currentCardMode").textContent = modeLabels[activeMode];

    const mainDisplay = document.getElementById("mainWord");

    // --- REVERSED TARGET DIRECTIONS FOR KOREAN LEARNING ---
    if (activeMode === "reading") {
      document.getElementById("choicesBox").classList.add("active");
      mainDisplay.textContent = currentCard.hangeul; mainDisplay.style.fontSize = "64px";
      buildMultipleChoices(currentCard, "english");
    } 
    else if (activeMode === "context") {
      document.getElementById("choicesBox").classList.add("active");
      mainDisplay.textContent = currentCard.useCase || "Scenario missing!"; mainDisplay.style.fontSize = "22px";
      buildMultipleChoices(currentCard, "hangeul");
    }
    // FIX: Show English Prompt -> Force User to produce/type Korean Characters
    else if (activeMode === "writing") {
      document.getElementById("writingInterfaceBox").classList.add("active");
      document.getElementById("writingInputField").value = "";
      document.getElementById("writingInputField").disabled = false;
      mainDisplay.textContent = currentCard.english; mainDisplay.style.fontSize = "42px";
    }
    // FIX: Show Korean Word Target -> Listen and assess if spoken Korean sounds correct
    else if (activeMode === "speaking") {
      document.getElementById("speakingInterfaceBox").classList.add("active");
      document.getElementById("speechTriggerBtn").disabled = false;
      mainDisplay.textContent = currentCard.hangeul; mainDisplay.style.fontSize = "64px";
    }
  }

  function buildMultipleChoices(currentCard, propertyToCompare) {
    const box = document.getElementById("choicesBox"); box.innerHTML = "";
    let targetAnswer = currentCard[propertyToCompare === "english" ? "english" : "hangeul"];
    let wrongPool = vocabPool.filter(v => v[propertyToCompare === "english" ? "english" : "hangeul"] !== targetAnswer);
    let wrongChoices = wrongPool.sort(() => Math.random() - 0.5).slice(0, 3);
    let distribution = [currentCard, ...wrongChoices].sort(() => Math.random() - 0.5);

    distribution.forEach(opt => {
      const btn = document.createElement("button"); btn.className = "choice-btn";
      let displayValue = opt[propertyToCompare === "english" ? "english" : "hangeul"];
      btn.textContent = displayValue;
      btn.disabled = false;
      btn.onclick = () => processEvaluationResult(displayValue === targetAnswer, currentCard.hangeul, btn);
      box.appendChild(btn);
    });
  }

  function checkWritingSubmission() {
    const guess = document.getElementById("writingInputField").value.trim().toLowerCase();
    const target = gameQueue[activeIndex].hangeul.trim().toLowerCase(); // Validates directly against Korean character target
    
    if(!guess) return;
    const isCorrect = (guess === target);
    if(isCorrect) document.getElementById("writingInputField").disabled = true;
    processEvaluationResult(isCorrect, gameQueue[activeIndex].hangeul, null);
  }

  function triggerVoiceCapture() {
    if (!recognition) { alert("Speech engine error."); return; }

    const wave = document.getElementById("voiceWaveElement");
    const feedback = document.getElementById("speechTranscriptionFeedback");
    wave.style.display = "block";
    feedback.textContent = "";

    recognition.start();

    recognition.onresult = function(event) {
      wave.style.display = "none";
      const userSpoke = event.results[0][0].transcript.trim();
      const targetKorean = gameQueue[activeIndex].hangeul.trim(); // Evaluates target Korean pronunciation

      const isMatch = (userSpoke === targetKorean);
      if(!isMatch) {
        feedback.textContent = `❌ Heard Sound: "${userSpoke}" (Expected: "${targetKorean}")`;
      } else {
        feedback.textContent = `✅ Perfect Pronunciation match!`;
      }
      processEvaluationResult(isMatch, targetKorean, null);
    };

    recognition.onerror = function() { wave.style.display = "none"; };
    recognition.onspeechend = function() { recognition.stop(); wave.style.display = "none"; };
  }

  function processEvaluationResult(isCorrect, hangeulWord, clickedBtnElement) {
    currentCardClicks++; myStats.totalClicks++;

    if(isCorrect) {
      playSound('success');
      if(clickedBtnElement) clickedBtnElement.classList.add("correct");
      document.querySelectorAll(".choice-btn").forEach(b => b.disabled = true);
      
      myStats.totalCards++;
      if(currentCardClicks === 1) myStats.firstTryCorrect++;
      socket.emit("submit_click", { word: hangeulWord, isCorrect: true });
    } else {
      playSound('error');
      if(clickedBtnElement) { clickedBtnElement.classList.add("incorrect"); clickedBtnElement.disabled = true; }
      myStats.wrongWordsMap[hangeulWord] = (myStats.wrongWordsMap[hangeulWord] || 0) + 1;
      socket.emit("submit_click", { word: hangeulWord, isCorrect: false });
    }
  }

  function sendNav(direction) {
    activeIndex += direction;
    socket.emit("nav_card", { activeIndex: activeIndex, mode: activeMode });
  }

  function triggerEndGame() {
    if(confirm("Generate cumulative session logs now?")) socket.emit("end_game");
  }

  function calculateAndDisplayStats(logs) {
    switchView("viewSummary");

    const accuracy = myStats.totalCards > 0 ? Math.round((myStats.firstTryCorrect / myStats.totalCards) * 100) : 100;
    document.getElementById("myAccuracy").textContent = `${accuracy}%`;
    document.getElementById("myAces").textContent = `${myStats.firstTryCorrect} / ${myStats.totalCards} cards`;
    
    let worstWord = "None!"; let maxOwnWrong = 0;
    for(let w in myStats.wrongWordsMap) {
      if(myStats.wrongWordsMap[w] > maxOwnWrong) { maxOwnWrong = myStats.wrongWordsMap[w]; worstWord = `${w}`; }
    }
    document.getElementById("myStruggle").textContent = worstWord;

    let overallClicks = logs.length;
    let trueClicks = logs.filter(l => l.isCorrect).length;
    let groupAvgPercentage = overallClicks > 0 ? Math.round((trueClicks / overallClicks) * 100) : 100;
    document.getElementById("myAccuracy").textContent = `${accuracy}% (Classroom Avg: ${groupAvgPercentage}%)`;

    let globalWrongMap = {};
    let totalIncorrectClicksByPlayer = {};

    logs.forEach(entry => {
      if(!entry.isCorrect) {
        globalWrongMap[entry.word] = (globalWrongMap[entry.word] || 0) + 1;
        totalIncorrectClicksByPlayer[entry.name] = (totalIncorrectClicksByPlayer[entry.name] || 0) + 1;
      } else {
        if(!totalIncorrectClicksByPlayer[entry.name]) totalIncorrectClicksByPlayer[entry.name] = 0;
      }
    });

    const cloud = document.getElementById("classroomStruggleCloud"); cloud.innerHTML = "";
    let elementsAdded = 0;
    for (let word in globalWrongMap) {
      elementsAdded++;
      const span = document.createElement("span");
      const failCount = globalWrongMap[word];
      span.className = "review-item-tag" + (failCount > 2 ? " heavy-fail" : "");
      span.textContent = `${word} (${failCount} errors total)`;
      cloud.appendChild(span);
    }
    if(elementsAdded === 0) cloud.innerHTML = "<div style='color:var(--pop-green); font-weight:700;'>🎉 No mistakes recorded across the session! Solid memory base!</div>";

    const board = document.getElementById("struggleLeaderboard"); board.innerHTML = "";
    for(let user in totalIncorrectClicksByPlayer) {
      const row = document.createElement("div"); row.className = "stat-row";
      row.innerHTML = `<span>👤 ${user}</span> <span style="color:var(--pop-pink)">${totalIncorrectClicksByPlayer[user]} incorrect submissions</span>`;
      board.appendChild(row);
    }
  }
</script>
