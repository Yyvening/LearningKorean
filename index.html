<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hangeul Popcorn Launcher</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap" rel="stylesheet">
<style>
  body {
    background-color: #F0F4FA;
    background-image: radial-gradient(#DCE4EC 2px, transparent 2px);
    background-size: 24px 24px;
    font-family: 'Fredoka', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
  }
  .launcher-card {
    background: #FFFFFF;
    border: 4px solid #1E293B;
    border-radius: 24px;
    padding: 40px 24px;
    text-align: center;
    box-shadow: 0 8px 0 #1E293B;
    max-width: 400px;
    width: 100%;
  }
  .icon {
    font-size: 64px;
    margin-bottom: 16px;
    display: inline-block;
  }
  h1 {
    font-size: 28px;
    color: #1E293B;
    margin: 0 0 8px 0;
  }
  p {
    color: #64748B;
    font-size: 16px;
    margin-bottom: 32px;
  }
  .launch-btn {
    display: inline-block;
    text-decoration: none;
    font-size: 18px;
    font-weight: 700;
    padding: 16px 32px;
    border-radius: 16px;
    border: 3px solid #1E293B;
    background: #FF6B6B;
    color: white;
    box-shadow: 0 4px 0 #1E293B;
    transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    text-transform: uppercase;
  }
  .launch-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 7px 0 #1E293B;
    background: #FF4A4A;
  }
  .launch-btn:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 #1E293B;
  }
</style>
</head>
<body>

<div class="launcher-card">
  <div class="icon">🍿</div>
  <h1>Hangeul Popcorn</h1>
  <p>Ready for the next studio challenge?</p>
  <!-- Links directly to your game file -->
  <a href="KQuiz.html" class="launch-btn">Start Game 🚀</a>
</div>

</body>
</html>
